[binary_path]
    path=data/add-ons/UCC_LUA
[/binary_path]

[modification]
    id=color_changer_lua
    name= _ "Unit Color Changer - Lua"
    type=hybrid

    description=_"Giving the options to colorise your units.
	
Supported Races:
	- Saurians
	- Drakes
	- Humans
	- Trolls
	- Merfolk
	- Orcs
	- Goblins
	- Wolves
	- Wose
	- Naga
	- Skeleton Bones
	- Bats (only with rare colors)
	- Gryphons
	- Dwarves (without Thunderer)
	- Mages (Rogue Mage, Dark Adept, Loyalist Mage)
	- Ogres"
    [options]
        [checkbox]
            id=color_changer_ingame_allsides
            name=_"Allow changing all sides (without it you can only change your own side)"
            description=_"Gives the player the option to change the color of all sides."
            default=no
        [/checkbox]
    [/options]

	### nightgaunt animation fix for UCCV
    [event]
        name=unit placed,post advance
        first_time_only=no
		id=nightgaunt_animation_fix_uccv
		[if]
			[have_unit]
				type="Nightgaunt,ENightgaunt"
				x,y=$x1,$y1
			[/have_unit]
			[then]
				[object]
					[filter]
						find_in=unit
						x,y=$x1,$y1
					[/filter]
					[effect]
						apply_to=new_animation
						[standing_anim]
							base_score=99
							shadow_start_time=0
							start_time=0
							alpha=0.8~0.3:1000,0.3~0.5:600,0.5~0.3:600,0.3~0.8:1000
							shadow_alpha=0.6~0.0:1000,0.0~0.2:600,0.2~0.0:600,0.0~0.6:1000
							[frame]
								image="units/undead-spirit/nightgaunt-standing-s-[3~1,2,3~1,2].png:[450,350,500,300,450,350,500,300]"
							[/frame]
							[shadow_frame]
								image="units/undead-spirit/nightgaunt-shadow.png:3200"
								auto_vflip=no
								layer=2
							[/shadow_frame]
						[/standing_anim]
					[/effect]
				[/object]
			[/then]
		[/if]
	[/event]

    # Load lua files
	[lua]
		code = <<
			_G.ucc_race_registry = {}
			
			-- Load the data (make sure the path UCC_LUA is correct)
			
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/bat_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/drake_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/dwarf_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/goblin_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/gryphon_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/human_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/ogre_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/merfolk_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/naga_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/orc_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/saurian_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/troll_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/undead_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/wose_data.lua")
			wesnoth.dofile("~add-ons/UCC_LUA/lua/race_data/wolf_data.lua")
			
			-- Load the logic files
			wesnoth.dofile("~add-ons/UCC_LUA/lua/picker.lua")
		>>
	[/lua]
	
[/modification]

[binary_path]
	path=data/add-ons/0_UCCV_Resources
[/binary_path]